<div class="card-eyebrow">Spacing scale</div>
<div style="display:flex; flex-direction:column; gap:7px;">
  <div style="display:flex;align-items:center;gap:14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;width:60px;">4 · xs</span><div style="height:6px;width:4px;background:#4D8CFF;"></div></div>

  <div style="display:flex;align-items:center;gap:14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;width:60px;">12</span><div style="height:6px;width:12px;background:#4D8CFF;"></div></div>
  <div style="display:flex;align-items:center;gap:14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;width:60px;">16 · md</span><div style="height:6px;width:16px;background:#4D8CFF;"></div></div>
  <div style="display:flex;align-items:center;gap:14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;width:60px;">24 · lg</span><div style="height:6px;width:24px;background:#4D8CFF;"></div></div>

  <div style="display:flex;align-items:center;gap:14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;width:60px;">120 · §</span><div style="height:6px;width:120px;background:#0F52BA;"></div></div>
</div>

<script>
/* ============================================================
   DYNAMIC SIDENOTE CLEARANCE (Global Portfolio Mandate)
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
    const sidenoteParagraphs = document.querySelectorAll('.col-with-sidenotes');
    sidenoteParagraphs.forEach(p => {
        const sn = p.querySelector('.sn');
        if (sn) {
            const updateHeight = () => {
                if (window.innerWidth >= 1240) {
                    // Calculate exact clearance needed based on the sidenote's absolute top position
                    const neededHeight = sn.offsetTop + sn.offsetHeight + 40;
                    p.style.minHeight = neededHeight + 'px';
                } else {
                    p.style.minHeight = 'auto';
                }
            };
            updateHeight();
            setTimeout(updateHeight, 250);
            window.addEventListener('resize', updateHeight);
        }
    });
});
</script>

</body></html>
