<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_shell.css"></head><body>
<div class="card-eyebrow">Eyebrows — hierarchy by tracking</div>
<div style="display:flex; flex-direction:column; gap:14px;">
  <div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.35em; color:#A1A1A6; text-transform:uppercase;">DATA SCIENCE &amp; SYSTEMS ARCHITECTURE</div>
    <div class="chip-meta" style="margin-top:4px;">tracking 0.35em · hero eyebrow</div>
  </div>
  <div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.25em; color:#4D8CFF; text-transform:uppercase;">FEATURED WORK</div>
    <div class="chip-meta" style="margin-top:4px;">tracking 0.25em · section eyebrow (sapphire)</div>
  </div>
  <div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.10em; color:#A1A1A6; text-transform:uppercase;">5 MIN READ · CASE STUDY</div>
    <div class="chip-meta" style="margin-top:4px;">tracking 0.10em · meta strip</div>
  </div>
</div>

<script>
/* ============================================================
   DYNAMIC SIDENOTE CLEARANCE (Global Portfolio Mandate)
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
    const sidenoteParagraphs = document.querySelectorAll('.col-with-sidenotes');
    sidenoteParagraphs.forEach(p => {
        const sn = p.querySelector('.sn');
        if (sn) {
            const updateHeight = () => {
                if (window.innerWidth >= 1240) {
                    // Calculate exact clearance needed based on the sidenote's absolute top position
                    const neededHeight = sn.offsetTop + sn.offsetHeight + 40;
                    p.style.minHeight = neededHeight + 'px';
                } else {
                    p.style.minHeight = 'auto';
                }
            };
            updateHeight();
            setTimeout(updateHeight, 250);
            window.addEventListener('resize', updateHeight);
        }
    });
});
</script>

</body></html>
