<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_shell.css"></head><body>
<div class="card-eyebrow">Search input · focus &rarr; sapphire</div>
<input style="width:100%;background:rgba(26,26,26,0.6);border:1px solid rgba(255,255,255,0.10);color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;padding:14px 20px;border-radius:8px;outline:none;box-sizing:border-box;" placeholder="Search architecture, algorithms, clinical concepts…">
<div style="height:14px;"></div>
<input style="width:100%;background:rgba(26,26,26,0.6);border:1px solid #4D8CFF;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;padding:14px 20px;border-radius:8px;outline:none;box-sizing:border-box;" value="entity resolution">

<script>
/* ============================================================
   DYNAMIC SIDENOTE CLEARANCE (Global Portfolio Mandate)
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
    const sidenoteParagraphs = document.querySelectorAll('.col-with-sidenotes');
    sidenoteParagraphs.forEach(p => {
        const sn = p.querySelector('.sn');
        if (sn) {
            const updateHeight = () => {
                if (window.innerWidth >= 1240) {
                    // Calculate exact clearance needed based on the sidenote's absolute top position
                    const neededHeight = sn.offsetTop + sn.offsetHeight + 40;
                    p.style.minHeight = neededHeight + 'px';
                } else {
                    p.style.minHeight = 'auto';
                }
            };
            updateHeight();
            setTimeout(updateHeight, 250);
            window.addEventListener('resize', updateHeight);
        }
    });
});
</script>

</body></html>
